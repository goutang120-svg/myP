server:
  port: 8082

spring:
  application:
    name: biz-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:nacos}

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:mem:biz;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  h2:
    console:
      enabled: true
  cloud:
    nacos:
      config:
        enabled: false
      discovery:
        enabled: false

---
spring:
  config:
    activate:
      on-profile: nacos
    import: "nacos:${spring.application.name}.yaml"
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      discovery:
        namespace: ${NACOS_NAMESPACE:public}
      config:
        import-check:
          enabled: false
        namespace: ${NACOS_NAMESPACE:public}
        file-extension: yaml
