spring:
  application:
    name: biz-service
  profiles:
    active: local

---
server:
  port: 8082

spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:mem:biz;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  h2:
    console:
      enabled: true
  cloud:
    nacos:
      config:
        enabled: true
      discovery:
        enabled: true

---
spring:
  config:
    activate:
      on-profile: nacos
