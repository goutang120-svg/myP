spring:
  application:
    name: biz-service
  config:
    import: "optional:nacos:"

  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}

      discovery:
        namespace: ${NACOS_NAMESPACE:public}

      config:
        import-check:
          enabled: false
        namespace: ${NACOS_NAMESPACE:public}
        file-extension: yaml
