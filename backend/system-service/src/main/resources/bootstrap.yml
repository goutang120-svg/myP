spring:
  application:
    name: system-service
  config:
    import: "nacos:${spring.application.name}.yaml"

  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:62.234.1.152:8848}
      username: ${NACOS_USERNAME:}
      password: ${NACOS_PASSWORD:}

      discovery:
        namespace: ${NACOS_NAMESPACE:b66c93ce-3c83-4edd-a789-e3f47335c127}
        group: ${NACOS_GROUP:STUDENT_MAGE}

      config:
        import-check:
          enabled: false
        namespace: ${NACOS_NAMESPACE:b66c93ce-3c83-4edd-a789-e3f47335c127}
        group: ${NACOS_GROUP:STUDENT_MAGE}
        file-extension: yaml
        refresh-enabled: true
        shared-configs:
          - data-id: common.yaml
            group: ${NACOS_GROUP:STUDENT_MAGE}
            refresh: true